<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 9</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <h1>Registro de Usuario</h1>

      <form id="formulario">
        <div class="form-group">
          <label for="nombre">Nombre completo:</label>
          <input type="text" id="nombre" placeholder="Escribe tu nombre" />
          <span id="error-nombre" class="error-mensaje"></span>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico:</label>
          <input type="text" id="email" placeholder="ejemplo@correo.com" />
          <span id="error-email" class="error-mensaje"></span>
        </div>
        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            placeholder="Mínimo 6 caracteres"
          />
          <span id="error-password" class="error-mensaje"></span>
        </div>
        <button type="submit" id="btn-enviar">Registrarse</button>

        <p id="mensaje-exito" class="exito-mensaje"></p>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
